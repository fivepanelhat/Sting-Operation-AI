version: '3.8'

services:
  sentinel-vision:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sting_sentinel_vision
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./runs:/app/runs
    environment:
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY}
    command: ["data/images/val/", "--no-save"]
    restart: unless-stopped
